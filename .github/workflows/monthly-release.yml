name: Monthly Dependency Rollup Release

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rollup:
    name: Update dependencies, build, and release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Update frontend dependencies
        working-directory: frontend
        run: |
          npm install -g npm-check-updates
          ncu -u
          npm install

      - name: Update backend dependencies
        run: python scripts/update_python_requirements.py backend/requirements.txt

      - name: Detect dependency changes
        id: changes
        run: |
          if git diff --quiet -- frontend/package.json frontend/package-lock.json backend/requirements.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        if: steps.changes.outputs.changed == 'true'
        id: version
        run: |
          VERSION="$(python scripts/bump_version.py)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install frontend dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        if: steps.changes.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build

      - name: Install backend dependencies
        if: steps.changes.outputs.changed == 'true'
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Compile backend
        if: steps.changes.outputs.changed == 'true'
        run: python -m compileall backend/app

      - name: Commit rollup
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION frontend/package.json frontend/package-lock.json backend/requirements.txt
          git commit -m "chore: monthly dependency rollup ${{ steps.version.outputs.version }}"
          git tag "v${{ steps.version.outputs.version }}"
          git push
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        if: steps.changes.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "v${{ steps.version.outputs.version }}"
          body: "Monthly dependency rollup release."
